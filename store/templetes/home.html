<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">My E-commerce 🛒</a>
  </div>
</nav>

<div class="container mt-4">
    <div class="row">

        {% for product in products %}
        <div class="col-md-4">
            <div class="card mb-4 shadow">
                
                <img src="{{ product.image.url }}" class="card-img-top" height="200">

                <div class="card-body">
                    <h5>{{ product.name }}</h5>
                    <p>{{ product.description|truncatewords:10 }}</p>
                    
                    <h6 class="text-success">₹{{ product.price }}</h6>

                    <!-- ✅ Add to Cart Button -->
                    <a href="/add/{{ product.id }}" class="btn btn-primary">
                        Add to Cart 🛒
                    </a>

                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
