{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 fw-bold text-center">🔥 Latest Shoes</h2>

<div class="row">

    {% for product in products %}
    <div class="col-md-4 mb-4">

        <div class="card card-hover shadow text-center">

           <a href="{% url 'product_detail' product.id %}">

    {% if product.image %}
        <img src="{{ product.image.url }}"
             class="card-img-top"
             height="300"
             style="object-fit: cover;">
    {% endif %}

</a>

            <div class="card-body">
               <h5 class="fw-bold">

    <a href="{% url 'product_detail' product.id %}"
       class="text-dark text-decoration-none">

       {{ product.name }}

    </a>

</h5>
                <p class="text-success fs-5 fw-bold">
                    ₹{{ product.price }}
                </p>

                <a href="{% url 'add_to_cart' product.id %}" class="btn btn-custom w-100">
                    <a href="{% url 'add_to_wishlist' product.id %}"
   class="btn btn-outline-danger w-100 mt-2">

   ❤️ Wishlist

</a>
                    🛒 Add to Cart
                </a>
            </div>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
