{% extends 'base.html' %}

{% block content %}

<div class="col-md-6 mx-auto">

    <div class="card shadow p-4 text-center">

        <h2 class="mb-4">👤 My Profile</h2>

        <h4 class="fw-bold">
            {{ user.username }}
        </h4>

        <p class="text-muted">
            Joined: {{ user.date_joined }}
        </p>

        <hr>

        <div class="row">

            <div class="col-6">
                <h5>Total Orders</h5>
                <h3 class="text-primary">
                    {{ total_orders }}
                </h3>
            </div>

            <div class="col-6">
                <h5>Total Spent</h5>
                <h3 class="text-success">
                    ₹{{ total_spent }}
                </h3>
            </div>

        </div>

        <hr>

        <a href="{% url 'my_orders' %}" class="btn btn-custom w-100 mb-2">
            📦 My Orders
        </a>

        <a href="{% url 'logout' %}" class="btn btn-danger w-100">
            Logout
        </a>

    </div>

</div>

{% endblock %}
